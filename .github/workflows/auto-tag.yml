name: Auto-tag on master

on:
  push:
    branches: [master]
  pull_request:
    paths: ['.github/workflows/auto-tag.yml']

permissions:
  contents: write

# Avoid concurrent tag races when multiple pushes land in quick succession.
concurrency:
  group: auto-tag-master
  cancel-in-progress: false

jobs:
  tag:
    # Skip when:
    #  - the push was created by github-actions itself (avoid loops)
    #  - the commit message contains [skip-release] (manual opt-out)
    #  - the commit is a version-bump commit (publish-stable historic compat
    #    — should not happen anymore but kept as belt-and-braces)
    if: >-
      github.event_name == 'push' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip-release]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use RELEASE_PAT so the resulting tag push re-triggers release.yml
          # (tags created by GITHUB_TOKEN do NOT trigger other workflows).
          token: ${{ secrets.RELEASE_PAT }}

      - name: Compute next tag (v{YYYY}.{M}.{DDNN})
        id: ver
        run: |
          set -euo pipefail
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)
          DAY=$(date -u +%d)
          PREFIX="v${YEAR}.${MONTH}.${DAY}"

          git fetch --tags --quiet

          # Patch segment is exactly {DD}{NN} — 2-digit day + 2-digit run number,
          # both zero-padded. This keeps semver ordering monotonic across days:
          # tomorrow's first push (DDNN=3101) is > today's last (3099+) because
          # the day component is the high-order pair of digits.
          # Historic tags v{YYYY}.{M}.{D}{N} (variable-width run number, e.g.
          # v2026.5.27278) are still readable but the new format is fixed-width
          # so every new tag has exactly 4 patch digits.
          MAX_NN=$(git tag --list "${PREFIX}??" \
                  | grep -E "^${PREFIX}[0-9]{2}$" \
                  | sed -E "s|^${PREFIX}||" \
                  | sort -n \
                  | tail -1 || true)
          NEXT_NN=$(printf '%02d' $(( ${MAX_NN:-0} + 1 )))
          TAG="${PREFIX}${NEXT_NN}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Next tag: ${TAG}"

      - name: Create and push tag
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "${TAG}" -m "Auto-tag from master @ ${GITHUB_SHA::7}"
          git push origin "${TAG}"

      - name: Bump package.json to match tag (no commit)
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          # Update package.json version in-place so the published npm package
          # version matches the git tag. We do NOT commit this — release.yml's
          # npm-publish step will use the in-place edit. The next master push
          # will start from the previous committed version regardless.
          VERSION="${TAG#v}"
          node -e "const p=require('./package.json'); p.version='${VERSION}'; require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          echo "package.json version set to ${VERSION} (in-place only)"

      - name: Summary
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          echo "## Tagged \`${TAG}\` :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "SHA: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Downstream release pipeline (release.yml on \`v*\` tags) will build binaries + publish npm." >> "$GITHUB_STEP_SUMMARY"

  # ── Regression test: tag computation must produce valid semver ──────────
  # Reproduces the bug fixed in #212 where the old v{YYYY}.{M}.{D}.{N}
  # scheme produced 4-segment tags (e.g. v2026.5.30.3) that npm coerced
  # into invalid prerelease versions, causing publish 404s.
  test-tag-scheme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Regression: broken tag v2026.5.30.3 must not poison next tag"
        run: |
          set -euo pipefail

          # Set up a throw-away repo with the known-broken tag
          tmp=$(mktemp -d)
          git init "$tmp/repo"
          cd "$tmp/repo"
          git config user.name "test"
          git config user.email "test@test"
          git commit --allow-empty -m "seed"

          # The original broken tag (4-segment, invalid semver) — #212
          git tag v2026.5.30.3
          # A valid tag produced after the fix
          git tag v2026.5.3001

          # ── Run the CURRENT computation logic (mirrors the 'ver' step) ──
          YEAR=2026; MONTH=5; DAY=30
          PREFIX="v${YEAR}.${MONTH}.${DAY}"

          MAX_NN=$(git tag --list "${PREFIX}??" \
                  | grep -E "^${PREFIX}[0-9]{2}$" \
                  | sed -E "s|^${PREFIX}||" \
                  | sort -n \
                  | tail -1 || true)
          NEXT_NN=$(printf '%02d' $(( ${MAX_NN:-0} + 1 )))
          TAG="${PREFIX}${NEXT_NN}"

          echo "Computed tag: ${TAG}"

          # ── Assertions ──

          # 1) Must be valid 3-segment semver (MAJOR.MINOR.PATCH)
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "FAIL: tag is not valid 3-segment semver: ${TAG}"
            exit 1
          fi
          echo "PASS: valid 3-segment semver"

          # 2) Must NOT reproduce the broken v2026.5.30.X scheme
          if [[ "$TAG" == v2026.5.30.* ]]; then
            echo "FAIL: tag uses broken dot-separated day scheme: ${TAG}"
            exit 1
          fi
          echo "PASS: no dot-separated day"

          # 3) Expected value: v2026.5.3002 (next after existing v2026.5.3001)
          if [[ "$TAG" != "v2026.5.3002" ]]; then
            echo "FAIL: expected v2026.5.3002, got ${TAG}"
            exit 1
          fi
          echo "PASS: correctly incremented to v2026.5.3002"

          # 4) npm must accept the version string as numeric semver
          node -e "
            const v = '${TAG#v}';
            const parts = v.split('.');
            if (parts.length !== 3) process.exit(1);
            if (parts.some(p => !/^\\d+$/.test(p))) process.exit(1);
            console.log('PASS: npm-compatible semver:', v);
          "

          rm -rf "$tmp"
