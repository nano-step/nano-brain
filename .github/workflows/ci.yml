name: CI

on:
  push:
    branches: [b-main]
  pull_request:
    branches: [b-main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: nanobrain
          POSTGRES_PASSWORD: nanobrain
          POSTGRES_DB: nanobrain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nanobrain -d nanobrain_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: CGO_ENABLED=0 go build -o nano-brain ./cmd/nano-brain

      - name: Test
        run: go test -race -short -count=1 ./...
        env:
          DATABASE_URL: postgres://nanobrain:nanobrain@localhost:5432/nanobrain_test
