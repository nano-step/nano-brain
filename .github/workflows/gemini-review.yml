name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: gemini-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    permissions:
      pull-requests: write
      contents: read
    uses: nano-step/shared-workflows/.github/workflows/gemini-review.yml@v1
    secrets: inherit
