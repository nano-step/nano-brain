name: Publish Beta

on:
  push:
    branches: [develop]

jobs:
  publish:
    uses: kokorolx/shared-workflows/.github/workflows/publish-beta.yml@v1
    with:
      package-name: "nano-brain"
      beta-branch: develop
      build-command: "npm run build:web"
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
