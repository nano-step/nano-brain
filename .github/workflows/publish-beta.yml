name: Publish Beta

on:
  push:
    branches: [beta]

concurrency:
  group: publish-beta-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      contents: write
    uses: nano-step/shared-workflows/.github/workflows/publish-beta.yml@v1
    with:
      package-name: "@nano-step/nano-brain"
    secrets: inherit
