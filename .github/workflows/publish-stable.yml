name: Publish Stable

on:
  push:
    branches: [master]

concurrency:
  group: publish-stable-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      contents: write
    uses: nano-step/shared-workflows/.github/workflows/publish-stable.yml@v1
    with:
      package-name: "@nano-step/nano-brain"
      changelog-insert-marker: "All notable changes to nano-brain are documented here."
    secrets: inherit
