# nano-brain default configuration
# Copy to ~/.nano-brain/config.yml and customize

logging:
  enabled: true

collections:
  memory:
    path: /root/.nano-brain/memory
    pattern: "**/*.md"
    update: auto
  sessions:
    path: /root/.nano-brain/sessions
    pattern: "**/*.md"
    update: auto

vector:
  provider: qdrant
  url: http://qdrant:6333
  collection: nano-brain

