# IMPORTANT: Ollama must be running natively on the host machine for GPU acceleration.
# On macOS (Apple Silicon), native Ollama uses Metal GPU → ~50-200ms per embed vs ~15s in Docker.
#
# Setup:
#   brew install ollama
#   OLLAMA_KEEP_ALIVE=30m OLLAMA_NUM_PARALLEL=4 ollama serve
#   ollama pull nomic-embed-text
#
# Then start this stack: docker compose up -d

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nano-brain-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - nano-brain-qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  nano-brain:
    image: node:22
    container_name: nano-brain-server
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3100:3100"
    volumes:
      - ${NANO_BRAIN_APP:-.}:/app
      - nano-brain-node-modules:/app/node_modules
      - ${NANO_BRAIN_HOME:-~/.nano-brain}:/root/.nano-brain
      - ${NANO_BRAIN_WORKSPACE:-/Users/tamlh/workspaces/NUSTechnology/Projects/zengamingx}:${NANO_BRAIN_WORKSPACE:-/Users/tamlh/workspaces/NUSTechnology/Projects/zengamingx}:ro
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://host.docker.internal:11434
      - NODE_OPTIONS=--max-old-space-size=1536
      - NANO_BRAIN_EMBEDDING_CONCURRENCY=3
    command: sh -c "npm install --omit=dev --prefer-offline --legacy-peer-deps && npm rebuild tree-sitter tree-sitter-python tree-sitter-typescript tree-sitter-javascript && ./node_modules/.bin/tsx src/index.ts mcp --http --port=3100 --host=0.0.0.0 --root=${NANO_BRAIN_WORKSPACE:-/Users/tamlh/workspaces/NUSTechnology/Projects/zengamingx}"
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  nano-brain-qdrant-data:
    driver: local
  nano-brain-node-modules:
    driver: local
