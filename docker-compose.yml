services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nano-brain-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - nano-brain-qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  nano-brain:
    image: node:22
    container_name: nano-brain-server
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3100:3100"
    volumes:
      - ${NANO_BRAIN_APP:-.}:/app
      - nano-brain-node-modules:/app/node_modules
      - ${NANO_BRAIN_HOME:-~/.nano-brain}:/root/.nano-brain
    environment:
      - NODE_ENV=production
    command: >
      sh -c "npm install --omit=dev --prefer-offline --legacy-peer-deps &&
             npx tsx src/index.ts mcp --http --port=3100 --host=0.0.0.0"
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  nano-brain-qdrant-data:
    driver: local
  nano-brain-node-modules:
    driver: local
