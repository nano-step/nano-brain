  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    .page-hero { padding: 64px 0 48px; }

    /* Rendered markdown styles */
    #changelog-content { max-width: 760px; }
    #changelog-content h1 { display: none; } /* hide top-level title, we have page-hero */
    #changelog-content h2 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 56px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #changelog-content h2::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent);
      flex-shrink: 0;
    }
    #changelog-content h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-top: 24px;
      margin-bottom: 10px;
    }
    #changelog-content ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    #changelog-content li {
      font-size: 14px;
      color: var(--text-muted);
      padding-left: 16px;
      position: relative;
      line-height: 1.6;
    }
    #changelog-content li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--text-subtle);
    }
    #changelog-content li strong { color: var(--text); font-weight: 600; }
    #changelog-content code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--accent);
    }
    #changelog-content a { color: var(--accent); }
    #changelog-content a:hover { text-decoration: underline; }
    #changelog-content p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    #changelog-content p strong {
      color: var(--text);
    }
    #changelog-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 14px;
      font-family: var(--mono);
      padding: 40px 0;
    }
    .loading-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s infinite;
    }
    .error-msg {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px;
      padding: 16px 20px;
      color: #f87171;
      font-size: 14px;
    }
  
    /* ── THREE.JS CANVAS (full viewport background) ── */
    #brain-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 0;
      opacity: 0.28;
    }
    .nav, .page-hero, .section, .footer, .feature-section, .setup-section {
      position: relative;
      z-index: 1;
    }
  </style>
</head>

<script>
  // Resolve CHANGELOG.md path relative to the page
  const changelogUrl = new URL('../CHANGELOG.md', window.location.href).href;

  fetch(changelogUrl)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    })
    .then(md => {
      document.getElementById('changelog-loading').style.display = 'none';
      document.getElementById('changelog-content').innerHTML = marked.parse(md);
    })
    .catch(err => {
      document.getElementById('changelog-loading').style.display = 'none';
      document.getElementById('changelog-content').innerHTML =
        `<div class="error-msg">Failed to load CHANGELOG.md: ${err.message}<br>
        <a href="https://github.com/nano-step/nano-brain/blob/master/CHANGELOG.md" target="_blank" style="color:#f87171">View on GitHub ↗</a></div>`;
    });
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', function() {
  if (!window.THREE) return;
  const canvas = document.getElementById('brain-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
  camera.position.z = 28;

  const NODE_COUNT = 70;
  const CONNECT_DIST = 7;
  const ACCENT = new THREE.Color(0x38bdf8);
  const ACCENT_DIM = new THREE.Color(0x0e5f82);

  const positions = [], velocities = [];
  for (let i = 0; i < NODE_COUNT; i++) {
    positions.push(new THREE.Vector3((Math.random()-0.5)*40,(Math.random()-0.5)*22,(Math.random()-0.5)*18));
    velocities.push(new THREE.Vector3((Math.random()-0.5)*0.012,(Math.random()-0.5)*0.008,(Math.random()-0.5)*0.006));
  }
  const nodeGeo = new THREE.SphereGeometry(0.18, 6, 6);
  const nodes = positions.map(pos => {
    const m = new THREE.Mesh(nodeGeo, new THREE.MeshBasicMaterial({ color: ACCENT }));
    m.position.copy(pos);
    m.userData.pulse = Math.random()*Math.PI*2;
    m.userData.pulseSpeed = 0.4+Math.random()*1.2;
    m.userData.isActive = Math.random()<0.15;
    scene.add(m);
    return m;
  });
  const MAX_EDGES = 180;
  const edgePositions = new Float32Array(MAX_EDGES*6);
  const edgeGeo = new THREE.BufferGeometry();
  edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
  scene.add(new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({ color: ACCENT, transparent: true, opacity: 0.18 })));

  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  let mx=0,my=0;
  document.addEventListener('mousemove', e => {
    mx = (e.clientX/window.innerWidth-0.5)*2;
    my = (e.clientY/window.innerHeight-0.5)*2;
  });

  let t=0, running=true;
  document.addEventListener('visibilitychange', () => {
    running = document.visibilityState === 'visible';
    if (running) animate();
  });
  function animate() {
    if (!running) return;
    requestAnimationFrame(animate);
    t += 0.008;
    nodes.forEach((node,i) => {
      node.position.addScaledVector(velocities[i],1);
      ['x','y','z'].forEach((ax,j) => {
        const limit=[20,11,9][j];
        if (Math.abs(node.position[ax])>limit) { velocities[i][ax]*=-1; node.position[ax]=Math.sign(node.position[ax])*limit; }
      });
      node.userData.pulse += node.userData.pulseSpeed*0.016;
      const b = 0.6+0.4*Math.sin(node.userData.pulse);
      if (node.userData.isActive) { node.material.color.lerpColors(ACCENT_DIM,ACCENT,b); node.scale.setScalar(0.8+0.6*b); }
      else { node.material.color.lerpColors(ACCENT_DIM,ACCENT,b*0.5); node.scale.setScalar(0.6+0.2*b); }
    });
    let idx=0;
    for (let i=0;i<NODE_COUNT&&idx<MAX_EDGES;i++) for (let j=i+1;j<NODE_COUNT&&idx<MAX_EDGES;j++) {
      if (nodes[i].position.distanceTo(nodes[j].position)<CONNECT_DIST) {
        const b=idx*6;
        edgePositions[b]=nodes[i].position.x; edgePositions[b+1]=nodes[i].position.y; edgePositions[b+2]=nodes[i].position.z;
        edgePositions[b+3]=nodes[j].position.x; edgePositions[b+4]=nodes[j].position.y; edgePositions[b+5]=nodes[j].position.z;
        idx++;
      }
    }
    for (let k=idx;k<MAX_EDGES;k++) edgePositions.fill(0,k*6,k*6+6);
    edgeGeo.attributes.position.needsUpdate=true;
    edgeGeo.setDrawRange(0,idx*2);
    camera.position.x = Math.sin(t*0.12)*3+mx*2;
    camera.position.y = Math.cos(t*0.08)*1.5-my*1.5;
    camera.lookAt(0,0,0);
    renderer.render(scene,camera);
  }
  animate();
});
</script>
