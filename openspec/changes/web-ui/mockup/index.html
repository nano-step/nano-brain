.ws-picker { padding: 12px 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }

.ws-picker-value { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border: 1px solid var(--border); transition: border-color 150ms; cursor: pointer; }

.nav-item-icon { width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; }
.nav-item-key { margin-left: auto; color: var(--text-4); font-size: 10px; font-family: "JetBrains Mono", monospace; }

.sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.theme-toggle { color: var(--text-3); padding: 4px 8px; border: 1px solid var(--border); font-size: 11px; transition: border-color 150ms; }
.theme-toggle:hover { border-color: var(--border-strong); color: var(--text-1); }
.cmdk-hint { color: var(--text-3); font-size: 11px; display: flex; align-items: center; gap: 4px; }
.kbd { display: inline-block; padding: 1px 5px; border: 1px solid var(--border-strong); font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--text-2); }

.banner-warn { background: rgba(239,68,68,0.08); border-bottom: 1px solid rgba(239,68,68,0.32); color: var(--err); padding: 8px 24px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
.topbar { display: flex; align-items: center; gap: 16px; padding: 12px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-0); z-index: 10; }

.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.section-title { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }

.pill-warn { color: var(--warn); border-color: rgba(245,158,11,0.32); }
.pill-err { color: var(--err); border-color: rgba(239,68,68,0.32); }
.pill-accent { color: var(--accent); border-color: rgba(0,112,243,0.32); }

.table { width: 100%; border-collapse: collapse; font-size: 12px; }
.table th { text-align: left; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; padding: 8px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-0); }
.table td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.table tr { cursor: pointer; }
.table tr:hover td { background: var(--bg-hover); }
.table .num { text-align: right; font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
.stat-card { background: var(--bg-0); padding: 14px 16px; }
.stat-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.stat-value { font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; font-size: 22px; letter-spacing: -0.02em; font-weight: 500; }
.stat-sub { color: var(--text-3); font-size: 11px; margin-top: 4px; font-family: "JetBrains Mono", monospace; }

/* progress */
.progress { height: 4px; background: var(--bg-2); position: relative; overflow: hidden; }
.progress-bar { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); transition: width 300ms; }
.progress-bar.ok { background: var(--ok); }
.progress-bar.warn { background: var(--warn); }
.progress-bar.err { background: var(--err); }

.surface { border: 1px solid var(--border); background: var(--bg-0); }

.surface-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-2); font-weight: 500; }

.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.filter-input { background: var(--bg-1); border: 1px solid var(--border); padding: 6px 10px; outline: none; min-width: 220px; transition: border-color 150ms; }

.chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border: 1px solid var(--border); background: var(--bg-1); font-size: 11px; color: var(--text-2); transition: border-color 150ms, color 150ms; cursor: pointer; }
.chip:hover { border-color: var(--border-strong); color: var(--text-1); }

.chip-x { color: var(--text-4); padding-left: 4px; }
.chip-x:hover { color: var(--err); }

.btn { padding: 6px 12px; border: 1px solid var(--border-strong); color: var(--text-1); font-size: 12px; transition: background 100ms, border-color 100ms; }
.btn:hover:not(:disabled) { background: var(--bg-hover); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.btn:disabled { color: var(--text-4); cursor: not-allowed; border-color: var(--border); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: white; }

.btn-danger { color: var(--err); border-color: rgba(239,68,68,0.4); }

.cmdk-item-key { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--text-4); }

.legend-row { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.mem-row { display: grid; grid-template-columns: 22px 1fr 200px 110px 60px; gap: 12px; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 100ms; }

.mem-icon { color: var(--text-3); display: inline-flex; align-items: center; justify-content: center; }
.mem-title { font-weight: 500; }
.mem-meta { color: var(--text-3); font-size: 11px; margin-top: 2px; }

.mem-time { color: var(--text-3); font-family: "JetBrains Mono", monospace; font-size: 11px; text-align: right; }
.mem-chain { color: var(--text-3); font-size: 11px; text-align: right; font-family: "JetBrains Mono", monospace; }

.form-row { display: grid; grid-template-columns: 220px 1fr; gap: 12px 16px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.form-label { color: var(--text-2); font-size: 12px; }
.form-hint { color: var(--text-3); font-size: 11px; margin-top: 2px; }
.form-input { background: var(--bg-1); border: 1px solid var(--border); padding: 6px 10px; font-family: "JetBrains Mono", monospace; font-size: 12px; outline: none; transition: border-color 150ms; min-width: 200px; }

const fmtNum = (n) => n.toLocaleString();
const fmtAge = (iso) => {
  const ms = Date.now() - new Date(iso).getTime();
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + "s ago";
  const m = Math.floor(s / 60);
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  const d = Math.floor(h / 24);
  return d + "d ago";
};
const fmtDuration = (s) => {

};

/* ----------------- wikilink + backlinks indices ----------------- */
const DOC_BY_ID = Object.fromEntries(RECENT_DOCS.map(d => [d.id, d]));
const DOC_BY_TITLE = (() => {
  const m = {};
  for (const d of RECENT_DOCS) {
    const k = d.title.toLowerCase();
    (m[k] = m[k] || []).push(d);
  }
  return m;
})();
const WIKILINK_RE = /\[\[([^\[\]\n]{1,200})\]\]/g;
const resolveWikilink = (target) => {
  const t = target.trim();
  if (DOC_BY_ID[t]) return { matched: [DOC_BY_ID[t]], ambiguous: false, kind: "id" };
  const hits = DOC_BY_TITLE[t.toLowerCase()] || [];
  return { matched: hits, ambiguous: hits.length > 1, kind: "title" };
};
const renderWithWikilinks = (text, onOpenDoc) => {
  // returns React nodes — naive but correct: split on regex, alternate text + link
  const out = [];
  let lastIndex = 0;
  let m;
  WIKILINK_RE.lastIndex = 0;
  while ((m = WIKILINK_RE.exec(text)) !== null) {
    if (m.index > lastIndex) out.push(text.slice(lastIndex, m.index));
    const res = resolveWikilink(m[1]);
    if (res.matched.length === 1) {
      const target = res.matched[0];
      out.push(
        <a key={m.index} href="#" className="wikilink"
           onClick={e => { e.preventDefault(); onOpenDoc(target); }}
           title={target.title}>{m[1]}</a>
      );
    } else if (res.ambiguous) {
      out.push(<span key={m.index} className="wikilink-broken" title={"Ambiguous: " + res.matched.map(d=>d.id).join(", ")}>{m[1]}</span>);
    } else {
      out.push(<span key={m.index} className="wikilink-broken" title="No document with that ID or title in this workspace">{m[1]}</span>);
    }
    lastIndex = m.index + m[0].length;
  }
  if (lastIndex < text.length) out.push(text.slice(lastIndex));
  return out;
};
const getBacklinks = (docId) => {
  const out = [];
  for (const d of RECENT_DOCS) {
    if (d.id === docId) continue;
    let m;
    WIKILINK_RE.lastIndex = 0;
    while ((m = WIKILINK_RE.exec(d.content)) !== null) {
      const res = resolveWikilink(m[1]);
      if (res.matched.some(t => t.id === docId)) {
        // snippet
        const start = Math.max(0, m.index - 60);
        const end = Math.min(d.content.length, m.index + m[0].length + 60);
        const snippet = (start > 0 ? "…" : "") + d.content.slice(start, end) + (end < d.content.length ? "…" : "");
        out.push({ ...d, snippet });
        break; // one row per referencing doc
      }
    }
  }
  return out.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
};

/* ----------------- knowledge-mode graph data (synthesized from RECENT_DOCS) ----------------- */
const KGRAPH_NODES = RECENT_DOCS.map((d, i) => ({
  id: d.id,
  kind: "doc",
  collection: d.collection,
  title: d.title,
  updated_at: d.updated_at,
  x: 120 + (i % 3) * 200,
  y: 120 + Math.floor(i / 3) * 140,
}));
const KGRAPH_EDGES = (() => {
  const edges = [];
  for (const d of RECENT_DOCS) {
    let m;
    WIKILINK_RE.lastIndex = 0;
    while ((m = WIKILINK_RE.exec(d.content)) !== null) {
      const res = resolveWikilink(m[1]);
      if (res.matched.length === 1) {
        edges.push({ source: d.id, target: res.matched[0].id, type: "references" });
      }
    }
  }
  return edges;
})();

  const ambiguousCount = useMemo(() => {
    let n = 0;
    let m;
    WIKILINK_RE.lastIndex = 0;
    while ((m = WIKILINK_RE.exec(doc.content)) !== null) {
      if (resolveWikilink(m[1]).ambiguous) n++;
    }
    return n;
  }, [doc.id, doc.content]);

  return (
    <>
      <div className="drawer-backdrop" onClick={onClose}/>
      <div className="drawer" role="dialog" aria-modal="true">

              <div className="drawer-sub">{doc.collection} · {doc.id}{ambiguousCount > 0 && <> · <span style={{color:"var(--warn)"}}>{ambiguousCount} ambiguous wikilink{ambiguousCount===1?"":"s"}</span></>}</div>
            </div>
            <button className="btn" onClick={onClose} aria-label="Close"><Icon name="close" size={12} /></button>

        </div>

            <div className="kv-k">collection</div><div className="kv-v">{doc.collection}</div>
            <div className="kv-k">updated</div><div className="kv-v">{doc.updated_at}</div>
            <div className="kv-k">tags</div><div className="kv-v">[{doc.tags.join(", ")}]</div>
            <div className="kv-k">supersedes</div><div className="kv-v">{doc.supersedes || "—"}</div>
            <div className="kv-k">superseded_by</div><div className="kv-v">{doc.superseded_by || "—"}</div>

          {(doc.supersedes || doc.superseded_by) && (

                <div style={{color:"var(--accent)"}}>● {doc.id} <span style={{color:"var(--text-4)"}}>(this)</span></div>
                {doc.supersedes && <div>↑ {doc.supersedes} <span style={{color:"var(--text-4)"}}>(older)</span></div>}

            </div>
          )}

            <div className="section-title">Referenced by · {backlinks.length} document{backlinks.length===1?"":"s"}</div>

              {backlinks.length === 0 ? (
                <div style={{padding:24, color:"var(--text-3)", fontSize:12, textAlign:"center"}}>
                  No other documents reference this yet. Other notes can link here via <code className="mono">[[{doc.id}]]</code> or <code className="mono">[[{doc.title}]]</code>.

const COMMANDS = [
  { group: "Navigation", items: [
    { id:"nav-dashboard", title:"Go to Dashboard",  sub:"/ui/dashboard",  key:"g d", panel:"dashboard" },
    { id:"nav-memory",    title:"Go to Memory",     sub:"/ui/memory",     key:"g m", panel:"memory" },

    { id:"nav-settings",  title:"Go to Settings",   sub:"/ui/settings",   key:"g ,", panel:"settings" },
  ]},
  { group: "Actions", items: [
    { id:"act-reindex",  title:"Trigger reindex",       sub:"POST /api/v1/reindex" },
    { id:"act-harvest",  title:"Trigger harvest",       sub:"POST /api/harvest" },
    { id:"act-reload",   title:"Reload config",         sub:"POST /api/reload-config" },
    { id:"act-reset-wks",title:"Reset workspace",       sub:"requires double-confirm" },
  ]},
  { group: "Symbols", items: SYMBOLS.slice(0, 6).map(s => ({ id:"sym-"+s.name, title:s.name, sub:s.file+":"+s.line, isSymbol:true })) },
];
const CommandPalette = ({ open, onClose, onNavigate }) => {
  const [q, setQ] = useState("");
  const [active, setActive] = useState(0);
  const inputRef = useRef(null);
  const filtered = useMemo(() => {
    if (!q) return COMMANDS;
    const lower = q.toLowerCase();
    return COMMANDS.map(g => ({ ...g, items: g.items.filter(i => i.title.toLowerCase().includes(lower) || i.sub.toLowerCase().includes(lower)) }))
                   .filter(g => g.items.length > 0);
  }, [q]);
  const flat = filtered.flatMap(g => g.items);

  useEffect(() => {
    if (open) { inputRef.current?.focus(); setActive(0); setQ(""); }
  }, [open]);
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === "Escape") { e.preventDefault(); onClose(); }
      else if (e.key === "ArrowDown") { e.preventDefault(); setActive(a => Math.min(a + 1, flat.length - 1)); }
      else if (e.key === "ArrowUp") { e.preventDefault(); setActive(a => Math.max(a - 1, 0)); }
      else if (e.key === "Enter") {
        e.preventDefault();
        const it = flat[active];
        if (it?.panel) onNavigate(it.panel);
        onClose();
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, flat, active]);

  if (!open) return null;
  let idx = -1;
  return (
    <div className="cmdk-backdrop" onClick={onClose}>
      <div className="cmdk" onClick={e => e.stopPropagation()}>
        <input ref={inputRef} className="cmdk-input" placeholder="Search memories, symbols, commands…" value={q} onChange={e => { setQ(e.target.value); setActive(0); }} />
        <div className="cmdk-list">
          {filtered.length === 0 ? (
            <div style={{padding:24, textAlign:"center", color:"var(--text-3)", fontSize:12}}>No matches for "{q}".</div>
          ) : filtered.map(g => (
            <div key={g.group}>
              <div className="cmdk-group-label">{g.group}</div>
              {g.items.map(it => {
                idx++;
                const i = idx;
                return (
                  <div key={it.id} className="cmdk-item" data-active={i===active} onMouseEnter={() => setActive(i)} onClick={() => { if (it.panel) onNavigate(it.panel); onClose(); }}>
                    <Icon name={it.isSymbol ? "function" : it.panel ? "arrow" : "search"} size={13} />
                    <div className="cmdk-item-text">
                      <div className="cmdk-item-title">{it.title}</div>
                      <div className="cmdk-item-sub">{it.sub}</div>
                    </div>
                    {it.key && <span className="cmdk-item-key">{it.key}</span>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

    return () => clearInterval(id);
  }, []);

  // global hotkeys
  useEffect(() => {
    let lastG = 0;
    const onKey = (e) => {
      const meta = e.metaKey || e.ctrlKey;
      if (meta && e.key.toLowerCase() === "k") { e.preventDefault(); setCmdOpen(true); return; }
      if (e.key === "Escape" && drawer) { setDrawer(null); return; }
      const tag = e.target?.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
      const t = Date.now();
      if (e.key === "g") { lastG = t; return; }
      if (t - lastG < 800) {
        const k = e.key.toLowerCase();
        if (k === "d") setPanel("dashboard");
        else if (k === "m") setPanel("memory");
        else if (k === "g") setPanel("graph");
        else if (k === "s") setPanel("symbols");
        else if (k === "h") setPanel("harvest");
        else if (k === ",") setPanel("settings");
        lastG = 0;

            <span>⚠</span>
            <span><strong>Server bound to 0.0.0.0:3100 without authentication.</strong> Anyone on the network can read and modify your memory. Bind to loopback or configure auth.</span>
          </div>
        )}
        <div className="topbar">
          <div>
            <div className="topbar-title">{titleFor(panel)}</div>
            <div className="topbar-crumbs">/ui/{panel} · workspace={workspace.hash}</div>
          </div>
          <div className="topbar-actions">
            <button className="btn" onClick={() => setUnsafeBind(b => !b)}>Toggle bind banner</button>
            <button className="btn" onClick={() => setCmdOpen(true)}>Search… <Kbd>⌘K</Kbd></button>
          </div>
        </div>

        {panel === "dashboard" && <DashboardPanel workspace={workspace} liveQueue={liveQueue} onOpenDoc={setDrawer} />}
        {panel === "memory"    && <MemoryPanel onOpenDoc={setDrawer} />}
        {panel === "graph"     && <GraphPanel onOpenDoc={setDrawer} />}
        {panel === "symbols"   && <SymbolsPanel />}
        {panel === "harvest"   && <HarvestPanel onOpenDoc={setDrawer} />}
        {panel === "settings"  && <SettingsPanel />}
      </main>

      <DocDrawer doc={drawer} onClose={() => setDrawer(null)} onOpenDoc={setDrawer} />
      <CommandPalette open={cmdOpen} onClose={() => setCmdOpen(false)} onNavigate={setPanel} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

/* speaker notes injection */
const notes = `
<p><strong>Design philosophy.</strong> "Tool a senior engineer would respect" — not a generic Tailwind admin template. Inspired by Linear (keyboard-first, dense), Vercel (sharp edges, single accent), Stripe (microstates, tabular alignment), Sourcegraph (code-page density), Logseq (graph performance), Datasette (column-action UX). Anti-patterns explicitly avoided: rounded everything, rainbow gradients, decorative color, generic spinners, modal-for-everything.</p>
<p><strong>Tokens.</strong> Dark default (#0D0D0D bg). Single accent (#0070F3). Status colors only for meaning. Border opacity 8%. Inter body + JetBrains Mono code. 8px base grid, sharp 0–4px radii.</p>
<p><strong>Dashboard.</strong> Stat-card grid with 1px border-grid (no shadows). Live embed queue counter updates every ~2s via simulated SSE. Recent docs preview the same row layout used in Memory panel for visual consistency. Pills (ok/warn/err) are the only colored elements.</p>
<p><strong>Memory.</strong> Tag chips toggle as multi-select AND filters. Meaningful empty state ("No memories match — clear filters or press Cmd+K"). Row layout is dense: icon · title+meta · tags · time · supersedes-indicator. Click → side drawer with full content, supersession chain, action buttons (Edit creates new doc that supersedes — never mutates content).</p>
<p><strong>Graph (dual-mode).</strong> Static SVG mockup of what Sigma.js will render in production. Two modes: <strong>Code</strong> (default — symbols + contains/imports/calls; edges color by type) and <strong>Knowledge</strong> (memory docs + session summaries + <code>references</code> edges extracted from <code>[[wikilinks]]</code>; nodes color by collection). Depth/direction/edge-type controls map 1:1 to /api/v1/graph/neighborhood request body with a new <code>node_kind</code> discriminator. Mode toggle persists focus per mode. Double-click a doc node in Knowledge mode → opens DocDrawer in place. Hard-cap badge visible at all times.</p>
<p><strong>Wikilinks + backlinks (Obsidian-style).</strong> Every document drawer renders content via the wikilink rewriter: <code>[[d-1042]]</code> or <code>[[exact title]]</code> become clickable inline links that open the target's drawer in place. Ambiguous titles → dotted underline with tooltip listing candidates. Unresolved → broken-link style. Every drawer has a "Referenced by" section listing inbound backlinks with title + collection + age + 200-char snippet around the link occurrence. Click a backlink to swap the drawer to that doc. Session-summary rows in Harvest panel open the same drawer, so harvested sessions become navigable nodes in the knowledge graph (the user can read the full summary with all wikilinks resolved, jump to referenced decisions, then jump back via backlinks).</p>
<p><strong>Symbols.</strong> Type-ahead with kind/lang filter chips. Sorted by impact (incoming edges) descending. Two-line cell: monospace name + dim signature. Location uses file:line format with line number dimmed (Sourcegraph pattern).</p>
<p><strong>Harvest.</strong> One button (Trigger harvest) + live counters (seen/summarized) driven by simulated SSE. Recent sessions table with preview snippet, source+agent+project+duration columns. Tabular numeric alignment.</p>
<p><strong>Settings.</strong> Form grid: label+hint on left (220px), input on right. Secrets shown as &lt;redacted&gt; (not editable in UI). Save button disabled until dirty. Doctor section uses ok/warn/err pills with inline hint text for warns/fails.</p>
<p><strong>Command palette (Cmd+K).</strong> Hand-rolled cmdk-equivalent. Three groups: Navigation, Actions, Symbols. Arrow keys move, Enter activates, Esc closes. Keyboard shortcuts visible on right of each item. Auto-focus on open.</p>
<p><strong>Keyboard nav.</strong> g+d, g+m, g+g, g+s, g+h, g+, (Linear pattern, two-keystroke sequence within 800ms). Esc closes drawer. Tab cycles within drawer (production: focus trap via aria-modal).</p>
<p><strong>Banner.</strong> Toggleable in top-bar for the prototype; in production, automatic based on /api/v1/config server.host. Persistent, non-dismissible, semantic red.</p>
<p><strong>Performance.</strong> Skeleton screens (not implemented in this static prototype but CSS class included) for any cell that streams. CSS uses no animations beyond 150ms transitions and a single shimmer keyframe.</p>
<p><strong>What this prototype intentionally omits.</strong> Real API calls (all data static). Full XSS sanitization (production uses react-markdown + rehype-sanitize before the wikilink rewriter; the prototype's renderer skips that step since mock data is trusted). Sigma.js (static SVG stand-in here). Authentication (v2). Mobile layout (desktop-first). The prototype's wikilink rewriter is a naive regex split that does NOT compose with Markdown formatting; production uses a remark/rehype plugin that operates on the AST after sanitization. All these production details are spec'd in OpenSpec design.md + tasks.md.</p>
<p><strong>Open questions for the user.</strong> (1) Should the Graph panel default to Code mode or Knowledge mode? Current: Code (matches v1 — symbol-first). (2) Should "Trigger reindex" require double-confirm like reset-workspace? (3) Should the wikilink rewriter also handle <code>[[doc-id|alias text]]</code> (Obsidian-style alias syntax)? Current spec: not in v1, deferred. (4) Should the bind-warning banner be allowed to be temporarily collapsed (not dismissed)? (5) For backlinks: should the snippet show all wikilink occurrences in the source doc, or just the first one? Current spec: just the first.</p>
`;
document.getElementById("notes-body").innerHTML = notes;
</script>
