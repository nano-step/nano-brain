version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/storage/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "sqlc"
        out: "internal/storage/sqlc/"
        overrides:
          - db_type: "vector"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              type: "Vector"
